server:
  port: 8080

spring:
  application:
    name: etf-compass-api
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_SMTP_STARTTLS:true}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/etf_compass}
    username: ${DB_USERNAME:etf_compass}
    password: ${DB_PASSWORD:etf_compass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  security:
    jwt-secret: ${JWT_SECRET:}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:60}
    password-reset-code-expiration-minutes: ${PASSWORD_RESET_CODE_EXPIRATION_MINUTES:15}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  market-data:
    provider: ${MARKET_DATA_PROVIDER:finnhub}
    finnhub-api-key: ${FINNHUB_API_KEY:${FMP_API_KEY:}}
    fmp-api-key: ${FMP_API_KEY:}
    enrich-on-position-create: ${MARKET_DATA_ENRICH_ON_POSITION_CREATE:true}
    refresh-on-read: ${MARKET_DATA_REFRESH_ON_READ:true}
    refresh-max-age-hours: ${MARKET_DATA_REFRESH_MAX_AGE_HOURS:24}
  mail:
    from-address: ${SMTP_FROM:no-reply@etf-compass.local}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
