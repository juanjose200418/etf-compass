server:
  forward-headers-strategy: framework
  error:
    include-binding-errors: never
    include-message: never
    include-stacktrace: never

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,https://etf-compass-beta.vercel.app}
  frontend-url: ${APP_FRONTEND_URL:https://etf-compass-beta.vercel.app}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.springdoc: INFO
