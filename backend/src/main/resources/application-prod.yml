server:
  forward-headers-strategy: framework
  error:
    include-binding-errors: never
    include-message: never
    include-stacktrace: never

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}}
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD}}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,https://TU-FRONTEND.vercel.app}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.springdoc: INFO
